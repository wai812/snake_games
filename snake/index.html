<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>經典貪食蛇 64x64</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50;
            color: white;
            font-family: Arial, sans-serif;
        }
        #game-container {
            position: relative;
            border: 4px solid #ecf0f1;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        canvas {
            display: block;
            background-color: #000;
        }
        #ui {
            margin-top: 15px;
            text-align: center;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
            border-radius: 5px;
        }
        .btn:hover { background: #2ecc71; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="snakeGame" width="640" height="640"></canvas>
        
        <div id="overlay">
            <h1>遊戲結束</h1>
            <p id="final-score"></p>
            <p id="final-time"></p>
            <button class="btn" onclick="resetGame()">重新開始</button>
        </div>
    </div>

    <div id="ui">
        <div>得分: <span id="score">0</span> | 速度等級: <span id="speed-level">1</span></div>
        <div style="font-size: 0.8em; color: #bdc3c7; margin-top: 5px;">使用 WASD 或 方向鍵 移動</div>
    </div>

<script>
    const canvas = document.getElementById("snakeGame");
    const ctx = canvas.getContext("2d");
    const scoreElement = document.getElementById("score");
    const speedElement = document.getElementById("speed-level");
    const overlay = document.getElementById("overlay");
    const finalScoreText = document.getElementById("final-score");
    const finalTimeText = document.getElementById("final-time");

    // 遊戲參數
    const gridSize = 64; // 64x64 格子
    const tileSize = canvas.width / gridSize;
    
    let snake = [];
    let food = { x: 0, y: 0 };
    let dx = 1;
    let dy = 0;
    let nextDx = 1;
    let nextDy = 0;
    let score = 0;
    let gameSpeed = 100; // 初始速度 (ms)
    let gameLoop;
    let startTime;
    let isGameOver = false;

    // 初始化遊戲
    function init() {
        snake = [
            { x: 32, y: 32 },
            { x: 31, y: 32 },
            { x: 30, y: 32 }
        ];
        dx = 1; dy = 0;
        nextDx = 1; nextDy = 0;
        score = 0;
        gameSpeed = 100;
        isGameOver = false;
        startTime = Date.now();
        
        scoreElement.innerText = score;
        speedElement.innerText = "1";
        overlay.style.display = "none";
        
        createFood();
        if (gameLoop) clearTimeout(gameLoop);
        main();
    }

    // 隨機生成食物
    function createFood() {
        food.x = Math.floor(Math.random() * gridSize);
        food.y = Math.floor(Math.random() * gridSize);
        // 確保食物不會長在蛇身上
        snake.forEach(part => {
            if (part.x === food.x && part.y === food.y) createFood();
        });
    }

    // 主循環
    function main() {
        if (isGameOver) return;

        gameLoop = setTimeout(function() {
            updateDirection();
            moveSnake();
            if (checkCollision()) {
                endGame();
                return;
            }
            draw();
            main();
        }, gameSpeed);
    }

    // 控制邏輯
    window.addEventListener("keydown", e => {
        const key = e.key.toLowerCase();
        // 防止 180 度轉向
        if ((key === "w" || key === "arrowup") && dy === 0) { nextDx = 0; nextDy = -1; }
        if ((key === "s" || key === "arrowdown") && dy === 0) { nextDx = 0; nextDy = 1; }
        if ((key === "a" || key === "arrowleft") && dx === 0) { nextDx = -1; nextDy = 0; }
        if ((key === "d" || key === "arrowright") && dx === 0) { nextDx = 1; nextDy = 0; }
    });

    function updateDirection() {
        dx = nextDx;
        dy = nextDy;
    }

    function moveSnake() {
        const head = { x: snake[0].x + dx, y: snake[0].y + dy };
        snake.unshift(head);

        // 吃到食物
        if (head.x === food.x && head.y === food.y) {
            score++;
            scoreElement.innerText = score;
            // 每吃 5 個食物增加速度
            if (score % 5 === 0) {
                gameSpeed = Math.max(30, gameSpeed - 10); // 最快限制在 30ms
                speedElement.innerText = Math.floor((110 - gameSpeed) / 10);
            }
            createFood();
        } else {
            snake.pop(); // 沒吃到就移除尾巴
        }
    }

    function checkCollision() {
        const head = snake[0];
        // 撞牆
        if (head.x < 0 || head.x >= gridSize || head.y < 0 || head.y >= gridSize) return true;
        // 撞自己
        for (let i = 1; i < snake.length; i++) {
            if (head.x === snake[i].x && head.y === snake[i].y) return true;
        }
        return false;
    }

    function draw() {
        // 清空背景
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 畫食物
        ctx.fillStyle = "#e74c3c";
        ctx.fillRect(food.x * tileSize, food.y * tileSize, tileSize - 1, tileSize - 1);

        // 畫蛇
        snake.forEach((part, index) => {
            ctx.fillStyle = (index === 0) ? "#2ecc71" : "#27ae60"; // 頭部淺綠，身體深綠
            ctx.fillRect(part.x * tileSize, part.y * tileSize, tileSize - 1, tileSize - 1);
        });
    }

    function endGame() {
        isGameOver = true;
        const endTime = Date.now();
        const duration = Math.floor((endTime - startTime) / 1000);
        
        finalScoreText.innerText = `成功吃到食物數量: ${score}`;
        finalTimeText.innerText = `總遊戲時間: ${duration} 秒`;
        overlay.style.display = "flex";
    }

    function resetGame() {
        init();
    }

    // 啟動
    init();

</script>
</body>
</html>
